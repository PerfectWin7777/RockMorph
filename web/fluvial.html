<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #ffffff;
            color: #333;
            font-family: 'Times New Roman', serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        #empty-state {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #aaa;
            font-size: 13px;
            gap: 8px;
        }

        #empty-state.hidden {
            display: none;
        }

        #plot-main {
            flex: 1;
            width: 100%;
            min-height: 380px;
        }

        #stats {
            padding: 5px 12px;
            background: #f5f5f5;
            border-top: 1px solid #ddd;
            display: flex;
            flex-wrap: wrap;
            gap: 6px 18px;
            font-size: 11px;
            font-family: Arial, sans-serif;
        }

        .stat-item {
            display: flex;
            flex-direction: column;
            min-width: 80px;
        }

        .stat-label {
            color: #888;
            font-size: 9px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stat-value {
            color: #222;
            font-weight: bold;
            font-size: 11px;
        }
    </style>
</head>

<body>

    <div id="empty-state">
        <span style="font-size:32px">〰</span>
        <span>Select layers and click Compute</span>
    </div>

    <div id="plot-main"></div>

    <div id="stats">
        <div class="stat-item">
            <span class="stat-label">BASIN</span>
            <span class="stat-value" id="stat-label">—</span>
        </div>
        <div class="stat-item">
            <span class="stat-label">SLk MAX</span>
            <span class="stat-value" id="stat-slk">—</span>
        </div>
        <div class="stat-item">
            <span class="stat-label">χ MAX</span>
            <span class="stat-value" id="stat-chi">—</span>
        </div>
        <div class="stat-item">
            <span class="stat-label">k_sn MEAN</span>
            <span class="stat-value" id="stat-ksn-mean">—</span>
        </div>
        <div class="stat-item">
            <span class="stat-label">k_sn MAX</span>
            <span class="stat-value" id="stat-ksn-max">—</span>
        </div>
        <div class="stat-item">
            <span class="stat-label">θ LOCAL</span>
            <span class="stat-value" id="stat-theta">—</span>
        </div>
        <div class="stat-item">
            <span class="stat-label">KNICKPOINTS</span>
            <span class="stat-value" id="stat-knick">—</span>
        </div>
        <div class="stat-item">
            <span class="stat-label">VIEW</span>
            <span class="stat-value" id="stat-view">—</span>
        </div>
    </div>

    <script src="js/qwebchannel.js"></script>
    <script src="js/plotly.min.js"></script>
    <script src="js/bridge.js"></script>
    

    <script>
        /**
         * fluvial.html — Fluvial Geomorphology visualization
         *
         * Two views, one plot div:
         *   "longitudinal" — Z vs distance
         *                    optional overlays: equilibrium (Hack),
         *                    SL index, SLk index, knickpoints
         *
         *   "chi"          — Z vs χ (chi-plot)
         *                    optional overlays: k_sn profile (right axis),
         *                    k_sn segments, equilibrium line, knickpoints
         *
         * Receives from Python via bridge:
         *   updatePlot(jsonString)
         *   clearPlot()
         *   exportViaSvg(divId)   — defined in bridge.js
         */

        // ── Shared state ──────────────────────────────────────────────
        var _currentData = null;

        // Scientific color palette — consistent across both views
        var COLORS = {
            z_profile: '#1a5276',   // deep blue  — measured Z
            equil: '#d35400',   // burnt orange — equilibrium (Hack)
            sl: '#1e8449',   // forest green — SL index
            slk: '#117a65',   // teal green   — SLk index
            chi_curve: '#148f77',   // cyan-teal    — Z vs chi
            ksn_profile: '#884ea0',   // purple       — k_sn continuous
            ksn_seg: '#c0392b',   // red          — k_sn segments
            knickpoint: '#e74c3c',   // red dot      — knickpoints
            equil_chi: '#d35400',   // same as equil
        };

        // ── Entry point ───────────────────────────────────────────────
        function updatePlot(jsonData) {
            var data = JSON.parse(jsonData);
            _currentData = data;

            document.getElementById('empty-state').classList.add('hidden');
            document.getElementById('plot-main').style.display = 'block';

            if (data.view_mode === 'longitudinal') {
                _renderLongitudinal(data);
            } else {
                _renderChi(data);
            }

            _updateStats(data);
        }

        function clearPlot() {
            _currentData = null;
            document.getElementById('empty-state').classList.remove('hidden');
            document.getElementById('plot-main').style.display = 'none';
            ['stat-label', 'stat-slk', 'stat-chi', 'stat-ksn-mean',
                'stat-ksn-max', 'stat-theta', 'stat-knick', 'stat-view']
                .forEach(function (id) {
                    document.getElementById(id).textContent = '—';
                });
        }

        // ── LONGITUDINAL VIEW ─────────────────────────────────────────
        function _renderLongitudinal(data) {
            var results = data.results || [];
            if (!results.length) return;

            // In longitudinal mode Python always sends one basin
            var r = results[0];

            var dist_km = r.distances_m.map(function (d) {
                return d / 1000;
            });

            var traces = [];
            var layout = _longitudinalLayout(r, data);

            // ── Trace 1 : Z profile — always on ──────────────────────
            traces.push({
                x: dist_km,
                y: r.elevations,
                name: r.label + ' — Z',
                type: 'scatter',
                mode: 'lines',
                line: {
                    color: data.style.z_profile.color,
                    width: data.style.z_profile.width,
                    dash: data.style.z_profile.shape
                },
                yaxis: 'y',
                hovertemplate:
                    '<b>' + r.label + '</b><br>' +
                    'Distance: %{x:.2f} km<br>' +
                    'Altitude: %{y:.1f} m<extra></extra>',
            });

            // ── Trace 2 : Equilibrium profile (Hack) — optional ───────
            if (data.show_equil && r.equil_elev && r.equil_elev.length) {
                traces.push({
                    x: dist_km,
                    y: r.equil_elev,
                    name: 'Equilibrium (Hack)',
                    type: 'scatter',
                    mode: 'lines',
                    line: {
                        color: data.style.equil.color,
                        width: data.style.equil.width,
                        dash: data.style.equil.shape,
                    },
                    yaxis: 'y',
                    hovertemplate:
                        'Equilibrium: %{y:.1f} m<extra></extra>',
                });
            }

            // ── Trace 3 : SL index — optional, SLk index — optional, right axis ─────────────
            var sl_data = null;
            var sl_color = null;
            var sl_name = null;

            if (data.sl_mode === 'sl' && r.sl && r.sl.length) {
                sl_data = r.sl;
                sl_color = data.style.sl_index.color;
                sl_name = 'SL index';
            } else if (data.sl_mode === 'slk' && r.slk && r.slk.length) {
                sl_data = r.slk;
                sl_color = data.style.sl_index.color;
                sl_name = 'SLk (normalised)';
            }
            // sl_mode === 'none' → sl_data reste null → rien n'est ajouté

            if (sl_data !== null) {
                traces.push({
                    x: dist_km,
                    y: sl_data,
                    name: sl_name,
                    type: 'scatter',
                    mode: 'lines',
                    line: {
                        color: sl_color,
                        width: data.style.sl_index.width,
                        dash: data.style.sl_index.shape
                    },
                    yaxis: 'y2',
                    hovertemplate: sl_name + ': %{y:.2f}<extra></extra>',
                });
            }


            // ── Trace 4 : Knickpoints — optional ─────────────────────
            if (data.show_knick_long && r.knickpoints && r.knickpoints.length) {
                var kx = r.knickpoints.map(function (kp) {
                    return kp.dist_m / 1000;
                });
                var ky = r.knickpoints.map(function (kp) {
                    return kp.elev_m;
                });
                traces.push({
                    x: kx,
                    y: ky,
                    name: 'Knickpoints',
                    type: 'scatter',
                    mode: 'markers',
                    marker: {
                        color: data.style.knickpoint.color,
                        size: data.style.knickpoint.width,
                        symbol: 'circle',
                        line: { color: '#fff', width: 1.0 },
                    },
                    yaxis: 'y',
                    hovertemplate:
                        '<b>Knickpoint</b><br>' +
                        'Distance: %{x:.2f} km<br>' +
                        'Altitude: %{y:.1f} m<extra></extra>',
                });
            }

            Plotly.react('plot-main', traces, layout, {
                responsive: true,
                mathjax: 'local'
            }).then(() => {
                if (window.MathJax) {
                    MathJax.typesetPromise();
                }
            });
        }

        function _longitudinalLayout(r, data) {  // 

                // Y2 exists ONLY if user explicitly chose to show SL or SLk
                // "none" mode = user wants only Z profile + equilibrium, no Y2
                var has_right = (
                    data.sl_mode !== 'none' &&
                    (
                        (data.sl_mode === 'sl' && r.sl && r.sl.length) ||
                        (data.sl_mode === 'slk' && r.slk && r.slk.length)
                    )
                );

                var right_title = '';
                if (has_right) {
                    right_title = data.sl_mode === 'sl' ? 'SL index' : 'SLk (normalised)';
                    if (data.invert_sl) right_title += ' ↓';
                }


            return {
                showlegend: true,
                legend: {
                    orientation: 'v', x: 1.08, y: 1,
                    xanchor: 'left', yanchor: 'top',
                    font: { family: 'Times New Roman', size: 10 },
                    bgcolor: 'rgba(255,255,255,0.9)',
                    bordercolor: '#ddd', borderwidth: 1,
                },
                xaxis: {
                    title: {
                        text: 'Distance from source (km)',
                        font: { family: 'Times New Roman', size: 12 },
                        standoff: 12,
                    },
                    showgrid: data.style.layout.x_grid,
                    gridcolor: '#dddddd',
                    gridwidth: 0.5,
                    showline: true,
                    linewidth: 1,
                    mirror: true,
                    ticks: 'outside',
                    ticklen: 4,
                    tickfont: { family: 'Times New Roman', size: 11 },
                    minor: {
                        showgrid: data.style.layout.x_grid,
                        gridcolor: '#eeeeee',
                        gridwidth: 0.2,
                    },
                    zeroline: false,
                },
                yaxis: {
                    title: {
                        text: 'Altitude (m)',
                        font: { family: 'Times New Roman', size: 12 },
                        standoff: 10,
                    },
                    showgrid: data.style.layout.y_grid,
                    gridcolor: '#dddddd',
                    gridwidth: 0.5,
                    showline: true,
                    linewidth: 1,
                    mirror: !has_right,
                    ticks: 'outside',
                    ticklen: 4,
                    tickfont: { family: 'Times New Roman', size: 11 },
                    minor: {
                        showgrid: data.style.layout.y_grid,
                        gridcolor: '#eeeeee',
                        gridwidth: 0.2,
                    },
                    zeroline: false,
                },
                yaxis2: {
                    title: {
                        text: right_title,
                        font: { family: 'Times New Roman', size: 12 },
                        standoff: 10,
                    },
                    overlaying: 'y',
                    rangemode: 'tozero', 
                    autorange: data.invert_sl ? 'reversed' : true,
                    side: 'right',
                    showgrid: false,
                    showline: has_right, 
                    linewidth: 1,
                    ticks: has_right ? 'outside' : '',
                    ticklen: 4,
                    tickfont: { family: 'Times New Roman', size: 11 },
                    zeroline: false,
                    visible: has_right,
                },
                margin: { t: 30, b: 55, l: 65, r: has_right ? 80 : 40 },
                hovermode: 'closest',
                template: 'plotly_white',
            };
        }

        // ── CHI-PLOT VIEW ─────────────────────────────────────────────
        function _renderChi(data) {
            var results = data.results || [];
            if (!results.length) return;

            // In chi mode Python may send multiple basins
            var traces = [];
            var layout = _chiLayout(data);

            results.forEach(function (r, idx) {
                var isHighlighted = !data.highlight_fids.length ||
                    data.highlight_fids.indexOf(r.fid) !== -1;
                var opacity = isHighlighted ? 1.0 : 0.25;

                // ── Z vs chi curve ────────────────────────────────────
                traces.push({
                    x: r.chi,
                    y: r.elev_chi,
                    name: r.label,
                    type: 'scatter',
                    mode: 'lines',
                    line: {
                        color: data.style.chi_curve.color,
                        width: isHighlighted ? data.style.chi_curve.width : data.style.chi_curve.width * 0.75,
                        dash: data.style.chi_curve.shape
                    },
                    opacity: opacity,
                    yaxis: 'y',
                    hovertemplate:
                        '<b>' + r.label + '</b><br>' +
                        'χ: %{x:.3f}<br>' +
                        'Z: %{y:.1f} m<extra></extra>',
                });

                // ── k_sn continuous profile — right axis ──────────────
                if (data.show_ksn_profile && r.ksn_profile && r.ksn_profile.length) {
                    traces.push({
                        x: r.chi,
                        y: r.ksn_profile,
                        name: r.label + ' k_sn',
                        type: 'scatter',
                        mode: 'lines',
                        line: {
                            color: data.style.ksn_profile.color,
                            width: data.style.ksn_profile.width,
                            dash: data.style.ksn_profile.shape
                        },
                        opacity: opacity * 0.7,
                        yaxis: 'y2',
                        hovertemplate:
                            'k_sn: %{y:.1f}<extra></extra>',
                        showlegend: idx === 0,
                    });
                }

                // ── k_sn segments — horizontal bars, right axis ───────
                if (data.show_ksn_segs && r.ksn_segments && r.ksn_segments.length) {
                    r.ksn_segments.forEach(function (seg, si) {
                        traces.push({
                            x: [seg.chi_start, seg.chi_end],
                            y: [seg.ksn, seg.ksn],
                            name: si === 0 ? (r.label + ' k_sn seg') : '',
                            type: 'scatter',
                            mode: 'lines',
                            line: {
                                color: data.style.ksn_seg.color,
                                width: data.style.ksn_seg.width,
                                dash: data.style.ksn_seg.shape
                            },
                            opacity: opacity,
                            yaxis: 'y2',
                            showlegend: si === 0 && idx === 0,
                            hovertemplate:
                                '<b>k_sn segment</b><br>' +
                                'k_sn = ' + seg.ksn.toFixed(1) + '<br>' +
                                'θ local = ' + seg.theta_local.toFixed(3) +
                                '<extra></extra>',
                        });

                        // k_sn value label above segment midpoint
                        // We add it as an annotation on the layout
                        if (!layout.annotations) layout.annotations = [];
                        var chi_mid = (seg.chi_start + seg.chi_end) / 2;
                        layout.annotations.push({
                            x: chi_mid,
                            y: seg.ksn,
                            xref: 'x',
                            yref: 'y2',
                            text: 'ksn=' + seg.ksn.toFixed(1),
                            showarrow: false,
                            font: {
                                family: 'Times New Roman',
                                size: 10,
                                color: data.style.ksn_seg.color,
                            },
                            xanchor: 'center',
                            yanchor: 'bottom',
                            yshift: 4,
                        });
                    });
                }

                // ── Equilibrium line — slope = mean k_sn ─────────────
                if (data.show_equil_chi && r.chi && r.chi.length) {
                    var chi_min = Math.min.apply(null, r.chi);
                    var chi_max = Math.max.apply(null, r.chi);
                    var z_mouth = r.elevations[r.elevations.length - 1];
                    var ksn_mean = r.ksn_mean || 0;

                    // z = z_mouth + k_sn * (chi_max - chi)
                    var eq_z = [
                        z_mouth + ksn_mean * (chi_max - chi_min),
                        z_mouth,
                    ];
                    traces.push({
                        x: [chi_min, chi_max],
                        y: eq_z,
                        name: 'Equilibrium (k_sn=' + ksn_mean.toFixed(1) + ')',
                        type: 'scatter',
                        mode: 'lines',
                        line: {
                            color: data.style.equil_chi.color,
                            width: data.style.equil_chi.width,
                            dash: data.style.equil_chi.shape,
                        },
                        opacity: opacity,
                        yaxis: 'y',
                        hoverinfo: 'skip',
                        showlegend: idx === 0,
                    });
                }

                // ── Knickpoints on chi-plot ───────────────────────────
                if (data.show_knick_chi &&
                    r.knickpoints && r.knickpoints.length) {

                    var kx = r.knickpoints.map(function (kp) {
                        return kp.chi;
                    });
                    var ky = r.knickpoints.map(function (kp) {
                        return kp.elev_m;
                    });
                    traces.push({
                        x: kx,
                        y: ky,
                        name: r.label + ' knickpoints',
                        type: 'scatter',
                        mode: 'markers',
                        marker: {
                            color: data.style.knickpoint.color,
                            size: data.style.knickpoint.width,
                            symbol: 'circle',
                            line: { color: '#fff', width: 1.0 },
                        },
                        opacity: opacity,
                        yaxis: 'y',
                        showlegend: idx === 0,
                        hovertemplate:
                            '<b>Knickpoint</b><br>' +
                            'χ: %{x:.3f}<br>' +
                            'Z: %{y:.1f} m<extra></extra>',
                    });
                }
            });

            Plotly.react('plot-main', traces, layout, { responsive: true });
        }

        function _chiLayout(data) {
            var has_ksn = data.show_ksn_profile || data.show_ksn_segs;

            return {
                showlegend: true,
                legend: {
                    orientation: 'v', x: 1.12, y: 1,
                    xanchor: 'left', yanchor: 'top',
                    font: { family: 'Times New Roman', size: 10 },
                    bgcolor: 'rgba(255,255,255,0.9)',
                    bordercolor: '#ddd', borderwidth: 1,
                },
                xaxis: {
                    title: {
                        text: 'χ',
                        font: {
                            family: 'Times New Roman',
                            size: 14,
                            style: 'italic',
                        },
                        standoff: 12,
                    },
                    autorange: true,
                    showgrid: data.style.layout.x_grid,
                    gridcolor: '#dddddd',
                    gridwidth: 0.5,
                    showline: true,
                    linewidth: 1,
                    mirror: true,
                    ticks: 'outside',
                    ticklen: 4,
                    tickfont: { family: 'Times New Roman', size: 11 },
                    minor: {
                        showgrid: data.style.layout.x_grid,
                        gridcolor: '#eeeeee',
                        gridwidth: 0.2,
                    },
                    zeroline: false,
                },
                yaxis: {
                    title: {
                        text: 'Altitude (m)',
                        font: { family: 'Times New Roman', size: 12 },
                        standoff: 10,
                    },
                    showgrid: data.style.layout.y_grid,
                    gridcolor: '#dddddd',
                    gridwidth: 0.5,
                    showline: true,
                    linewidth: 1,
                    mirror: !has_ksn,
                    ticks: 'outside',
                    ticklen: 4,
                    tickfont: { family: 'Times New Roman', size: 11 },
                    minor: {
                        showgrid: data.style.layout.y_grid,
                        gridcolor: '#eeeeee',
                        gridwidth: 0.2,
                    },
                    zeroline: false,
                },
                yaxis2: {
                    title: {
                        text: 'kₛₙ (m⁰·⁹)',
                        font: { family: 'Times New Roman', size: 14 },
                        standoff: 10,
                    },
                    overlaying: 'y',
                    rangemode: 'tozero',
                    autorange: true,
                    side: 'right',
                    showgrid: false,
                    showline: true,
                    linewidth: 1,
                    ticks: 'outside',
                    ticklen: 4,
                    tickfont: { family: 'Times New Roman', size: 11 },
                    zeroline: false,
                    rangemode: 'nonnegative',
                    visible: has_ksn,
                },
                margin: { t: 30, b: 55, l: 65, r: has_ksn ? 80 : 40 },
                hovermode: 'closest',
                template: 'plotly_white',
                annotations: [],   // filled by k_sn segment labels above
            };
        }

        // ── Stats bar ─────────────────────────────────────────────────
        function _updateStats(data) {
            var results = data.results || [];
            if (!results.length) return;

            // In longitudinal mode — single basin stats
            // In chi mode — use first (active) basin for stats bar
            var r = results[0];

            document.getElementById('stat-label').textContent =
                r.label || '—';
            document.getElementById('stat-slk').textContent =
                r.slk_max !== undefined ? r.slk_max.toFixed(3) : '—';
            document.getElementById('stat-chi').textContent =
                r.chi_max !== undefined ? r.chi_max.toFixed(3) : '—';
            document.getElementById('stat-ksn-mean').textContent =
                r.ksn_mean !== undefined ? r.ksn_mean.toFixed(1) : '—';
            document.getElementById('stat-ksn-max').textContent =
                r.ksn_max !== undefined ? r.ksn_max.toFixed(1) : '—';
            document.getElementById('stat-theta').textContent =
                r.theta_local !== undefined ? r.theta_local.toFixed(3) : '—';
            document.getElementById('stat-knick').textContent =
                r.knickpoints ? r.knickpoints.length : '—';
            document.getElementById('stat-view').textContent =
                data.view_mode === 'longitudinal' ? 'Longitudinal' : 'χ-plot';
        }

        // ── Utility ───────────────────────────────────────────────────
        function _hexToRgba(hex, alpha) {
            var r = parseInt(hex.slice(1, 3), 16);
            var g = parseInt(hex.slice(3, 5), 16);
            var b = parseInt(hex.slice(5, 7), 16);
            return 'rgba(' + r + ',' + g + ',' + b + ',' + alpha + ')';
        }

    </script>
</body>

</html>
