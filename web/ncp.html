<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #ffffff;
            color: #333;
            font-family: Arial, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        #empty-state {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #aaa;
            font-size: 13px;
            gap: 8px;
        }

        #empty-state.hidden {
            display: none;
        }

        #plot-main {
            flex: 1;
            width: 100%;
            min-height: 350px;
        }

        #stats {
            padding: 6px 12px;
            background: #f5f5f5;
            border-top: 1px solid #ddd;
            display: flex;
            flex-wrap: wrap;
            gap: 8px 20px;
            font-size: 12px;
        }

        .stat-item {
            display: flex;
            flex-direction: column;
            min-width: 80px;
        }

        .stat-label {
            color: #888;
            font-size: 9px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stat-value {
            color: #222;
            font-weight: bold;
            font-size: 12px;
        }
    </style>
</head>

<body>

    <div id="empty-state">
        <span style="font-size:32px">〰</span>
        <span>Select layers and click Compute</span>
    </div>

    <div id="plot-main"></div>
    

    <div id="stats">
        <div class="stat-item">
            <span class="stat-label">BASINS</span>
            <span class="stat-value" id="stat-n">—</span>
        </div>
        <div class="stat-item">
            <span class="stat-label">MaxC MEAN</span>
            <span class="stat-value" id="stat-maxc">—</span>
        </div>
        <div class="stat-item">
            <span class="stat-label">dL MEAN</span>
            <span class="stat-value" id="stat-dl">—</span>
        </div>
        <div class="stat-item">
            <span class="stat-label">CONCAVITY MEAN</span>
            <span class="stat-value" id="stat-concav">—</span>
        </div>
        <div class="stat-item">
            <span class="stat-label">VIEW</span>
            <span class="stat-value" id="stat-view">—</span>
        </div>
    </div>

    <script src="js/qwebchannel.js"></script>
    <script src="js/plotly.min.js"></script>
    <script src="js/bridge.js"></script>

    <script>
        /**
         * ncp.html — Normalized Channel Profile visualization
         *
         * Two views, one plot div:
         *   "profiles" — normalized longitudinal profiles + equilibrium diagonal
         *   "binary"   — scatter plot with user-chosen X and Y axes
         *
         * Receives from Python:
         *   updatePlot(jsonString)
         *   clearPlot()
         *   exportViaSvg(divId)   — defined in bridge.js
         */

        var PALETTE = [
            '#0924d5', '#e74c3c', '#0dee6a', '#8e44ad',
            '#e67e22', '#17f4c8', '#f0321d', '#335e7b',
            '#f1c40f', '#f16507', '#455764', '#12e7bc'
        ];

        var _currentData = null;

        // ── Entry point ───────────────────────────────────────────────
        function updatePlot(jsonData) {
            var data = JSON.parse(jsonData);
            _currentData = data;

            document.getElementById('empty-state').classList.add('hidden');
            document.getElementById('plot-main').style.display = 'block';

            if (data.view_mode === 'profiles') {
                _renderProfiles(data);
            } else {
                _renderBinary(data);
            }

            _updateStats(data);
        }

        function clearPlot() {
            _currentData = null;
            document.getElementById('empty-state').classList.remove('hidden');
            document.getElementById('plot-main').style.display = 'none';
            ['stat-n', 'stat-maxc', 'stat-dl', 'stat-concav', 'stat-view']
                .forEach(function (id) {
                    document.getElementById(id).textContent = '—';
                });
        }

        // ── Profiles view ─────────────────────────────────────────────
        function _renderProfiles(data) {
            var traces = [];
            // In profile mode, Python sends only one basin in results
            var results = data.results || [];
            var st = data.style || {};
            var highlighted = data.highlight_fids || [];

              // Helper for Alpha
            function hexToRgba(hex, alpha) {
                var r = parseInt(hex.slice(1, 3), 16),
                    g = parseInt(hex.slice(3, 5), 16),
                    b = parseInt(hex.slice(5, 7), 16);
                return "rgba(" + r + "," + g + "," + b + "," + alpha + ")";
            }

            

           results.forEach(function (r, idx) {

               // --- LAYER 1: Basal Fill (To Zero Y) ---
                if (st.fill_basal) {
                    traces.push({
                        x: r.x, y: r.y,
                        type: 'scatter', mode: 'none',
                        fill: 'tozeroy',
                        fillcolor: hexToRgba(st.color_basal, 0.35),
                        hoverinfo: 'skip', showlegend: false
                    });
                }
                
                // --- LAYER 2:  Equilibrium diagonal — from (0,1) to (1,0)
                    traces.push({
                        x: [0, 1], y: [1, 0],
                        name: 'Equilibrium',
                        type: 'scatter', mode: 'lines',
                        visible: st.diag_show,
                        line: { 
                            color: st.diag_color, 
                            width: st.diag_width, 
                            dash: 'dash' 
                        },
                        hoverinfo: 'skip'
                });


                // --- LAYER 3: NCP Curve & Deviation Fill ---
                var isConcave = r.concavity >= 0;
                var devFillColor = isConcave ? st.color_concave : st.color_convex;

                traces.push({
                    x: r.x, y: r.y,
                    name: r.label,
                    type: 'scatter', mode: 'lines',
                    line: { color: st.curve_color, width: st.curve_width },
                    // Logic: Fill back to the previous trace (The Diagonal)
                    fill: st.fill_dev ? 'tonexty' : 'none',
                    fillcolor: hexToRgba(devFillColor, 0.35),
                    hovertemplate:
                        '<b>' + r.label + '</b><br>' +
                        'Dist norm: %{x:.3f}<br>' +
                        'Elev norm: %{y:.3f}<br>' +
                        'MaxC=' + r.maxC.toFixed(4) +
                        '  dL=' + r.dL.toFixed(4) +
                        '  Concavity=' + r.concavity.toFixed(2) + '%' +
                        '<extra></extra>',
                });

               
            });

            var layout = _profileLayout();

            // Add MaxC and dL annotations for the single basin
             // 2. Add Smart Annotations (only if one basin and toggle is ON)
            if (results.length === 1) {
                var elements  = _profileAnnotations(results[0], data.show_arrows, data.show_info_box );
                layout.shapes = elements.shapes;
                layout.annotations = elements.annotations;
            }


            Plotly.react('plot-main', traces, layout, { responsive: true });
        }
        

        /**
     * Generates double-ended arrows and labels for dL and MaxC.
     * Tony's Algorithm Logic: yC is the point on the curve, yD is on the diagonal.
     */
           function _profileAnnotations(r, showArrows, showBox) {
                if (!r) return [];

                if (r.maxC === null || r.dL === null) return [];

                var dL = r.dL;
                var yC = r.y_at_dL;
                var yD = r.y_diag_at_dL;
                var shapes = [];
                var ann = [];
                
                // --- GROUP 1: ARROWS & DATA LABELS ---
                if (showArrows) {
                   // --- 1. THE TRUNKS (Shapes) ---
                   // Horizontal line for dL
                   shapes.push({
                       type: 'line', x0: 0, y0: yC, x1: dL, y1: yC,
                       xref: 'x', yref: 'y',
                       line: { color: '#222', width: 1.0 }
                   });
                   // Vertical line for MaxC
                   shapes.push({
                       type: 'line', x0: dL, y0: yC, x1: dL, y1: yD,
                       xref: 'x', yref: 'y',
                       line: { color: '#222', width: 1.0 }
                   });

                   // --- 2. THE HEADS & LABELS (Annotations) ---
                   // Left Head (dL)
                   ann.push({
                       x: 0, y: yC, xref: 'x', yref: 'y', showarrow: true,
                       arrowhead: 1, arrowsize: 1, arrowwidth: 1, ax: 5, ay: 0, // ax=5 creates a tiny offset for the head
                       text: ''
                   });
                   // Right Head (dL)
                   ann.push({
                       x: dL, y: yC, xref: 'x', yref: 'y', showarrow: true,
                       arrowhead: 1, arrowsize: 1, arrowwidth: 1, ax: -5, ay: 0,
                       text: ''
                   });
                   // dL Label (Still anchored correctly)
                   ann.push({
                       x: dL / 2, y: yC + 0.00, xref: 'x', yref: 'y',
                       text: '<i>dL: ' + dL.toFixed(3) + '</i>',
                       showarrow: false, font: { size: 11, family: 'serif' },
                       xanchor: 'center', yanchor: 'bottom'
                   });

                   // MaxC Heads (Top & Bottom)
                   var yTop = Math.max(yC, yD);
                   var yBottom = Math.min(yC, yD);
                   ann.push({
                       x: dL, y: yTop, xref: 'x', yref: 'y', showarrow: true,
                       arrowhead: 1, arrowsize: 1, arrowwidth: 1, ax: 0, ay: 5, text: ''
                   });
                   ann.push({
                       x: dL, y: yBottom, xref: 'x', yref: 'y', showarrow: true,
                       arrowhead: 2, arrowsize: 1, arrowwidth: 1, ax: 0, ay: -5, text: ''
                   });
                   // MaxC Label
                   ann.push({
                       x: dL + 0.01, y: (yC + yD) / 2, xref: 'x', yref: 'y',
                       text: '<i>MaxC: ' + Math.abs(r.maxC).toFixed(3) + '</i>',
                       showarrow: false, font: { size: 11, family: 'serif' },
                       xanchor: 'left'
                   });
               }
                
                // --- GROUP 2: TOP-RIGHT INFO BOX ---
               if (showBox) {
                    // --- 3. TOP-RIGHT INFO BOX (The "Pro" signature) ---
                    
                    var yBase = 0.98;
                    var lineSpacing = 0.045; // space beetween lines 

                    var lines = [
                        '<b>' + r.label + '</b>',
                        'Concavity: ' + r.concavity.toFixed(2) + '%',
                        'MaxC: '      + Math.abs(r.maxC).toFixed(3),
                        'dL: '         + r.dL.toFixed(3)
                    ];

                    lines.forEach(function(lineText, i) {
                        ann.push({
                            x: 1.0, 
                            y: yBase - (i * lineSpacing),
                            xref: 'x', 
                            yref: 'y',
                            
                            xanchor: 'right', 
                            yanchor: 'top',
                            text: lineText,
                            showarrow: false,
                            font: { family: 'serif', size: 12 },
                            align: 'right',
                            xshift: -10,
                            yshift: -10
                        });
                    });
                }

               return { shapes: shapes, annotations: ann };
            }


        function _profileLayout() {
                var axis = {
                    range: [0, 1],
                    constrain: 'domain', 
                    showgrid: true, gridcolor: '#cccccc', gridwidth: 0.5,
                    showline: true, linewidth: 1, mirror: true,
                    ticks: 'outside', ticklen: 4,
                    tickfont: { family: 'Times New Roman', size: 12 },
                    tickformat: '.2f', dtick: 0.2,
                    automargin: false,
                    minor: {
                        showgrid: true, gridcolor: '#eeeeee',
                        gridwidth: 0.1, dtick: 0.05
                    },
                };
                return {
                    showlegend: true,
                    legend: {
                        orientation: 'v', x: 1.01, y: 1,
                        xanchor: 'left', yanchor: 'top',
                        font: { family: 'Times New Roman', size: 10 },
                        bgcolor: 'rgba(255,255,255,0.9)',
                        bordercolor: '#ddd', borderwidth: 1,
                    },
                    xaxis: Object.assign({}, axis, {
                        title: {
                            text: 'Normalized distance from source',
                            font: { family: 'Times New Roman' }, standoff: 12,
                        },
                       
                    }),
                    yaxis: Object.assign({}, axis, {
                        scaleanchor: 'x',      // ← anchor y-axis to x-axis
                        scaleratio: 1,         // ← ratio 1:1 to ensure square plot
                        title: {
                            text: 'Normalized elevation',
                            font: { family: 'Times New Roman' }, standoff: 12,
                        },
                    }),
                    margin: { t: 30, b: 55, l: 70, r: 200 },
                    hovermode: 'closest',
                    template: 'plotly_white',
                };
            }

        // ── Binary plot view ──────────────────────────────────────────
        function _renderBinary(data) {
            var results = data.results || [];
            var hlFids = data.highlight_fids || [];
            var xKey = data.x_axis || 'maxC';
            var yKey = data.y_axis || 'dL';
            var xLabel = data.x_axis_label || xKey;
            var yLabel = data.y_axis_label || yKey;

            // Compute means for reference lines
            
            var xVals = results.map(function (r) { return r[xKey]; }).filter(v => v !== null);
            var yVals = results.map(function (r) { return r[yKey] || 0; });
            var xMean = xVals.reduce(function (a, b) { return a + b; }, 0) / xVals.length;
            var yMean = yVals.reduce(function (a, b) { return a + b; }, 0) / yVals.length;
            var xMin = Math.min.apply(null, xVals);
            var xMax = Math.max.apply(null, xVals);
            var yMin = Math.min.apply(null, yVals);
            var yMax = Math.max.apply(null, yVals);
            var xPad = (xMax - xMin) * 0.12 || 0.05;
            var yPad = (yMax - yMin) * 0.12 || 0.05;

            var traces = [];

            // Main scatter — one point per basin
            var isHlMode = hlFids.length > 0;
            results.forEach(function (r, idx) {
                var isHl = !isHlMode || hlFids.indexOf(r.fid) !== -1;
                var color = PALETTE[idx % PALETTE.length];
                traces.push({
                    x: [r[xKey] || 0],
                    y: [r[yKey] || 0],
                    name: r.label,
                    customdata: [r.fid], // for click events
                    type: 'scatter', mode: 'markers+text',
                    marker: {
                        color: color,
                        size: isHl ? 9 : 7,
                        opacity: isHl ? 1.0 : 0.3,
                        line: { color: '#fff', width: 1 }
                    },
                    text: [r.label],
                    textposition: 'top center',
                    textfont: { size: 9 },
                    hovertemplate:
                        '<b>' + r.label + '</b><br>' +
                        xLabel + ': %{x:.4f}<br>' +
                        yLabel + ': %{y:.4f}<br>' +
                        'MaxC=' + (r.maxC !== null ? r.maxC.toFixed(4) : '/') +
                        '  dL=' + (r.dL !== null ? r.dL.toFixed(4) : '/') +
                        '  Concavity=' + r.concavity.toFixed(2) + '%' +
                        '<extra></extra>',
                    showlegend: false,
                });
            });

            // Mean vertical reference line (X axis mean)
            traces.push({
                x: [xMean, xMean],
                y: [yMin - yPad, yMax + yPad],
                name: xLabel + ' mean: ' + xMean.toFixed(3),
                type: 'scatter', mode: 'lines',
                line: { color: '#f10b17', width: 1, dash: 'dash' },
                hoverinfo: 'skip',
            });

            // Mean horizontal reference line (Y axis mean)
            traces.push({
                x: [xMin - xPad, xMax + xPad],
                y: [yMean, yMean],
                name: yLabel + ' mean: ' + yMean.toFixed(3),
                type: 'scatter', mode: 'lines',
                line: { color: '#f10b17', width: 1, dash: 'dash' },
                hoverinfo: 'skip',
            });

            var layout = {
                showlegend: true,
                legend: {
                    orientation: 'v', x: 1.01, y: 1,
                    xanchor: 'left', yanchor: 'top',
                    font: { family: 'Times New Roman', size: 10 },
                    bgcolor: 'rgba(255,255,255,0.9)',
                    bordercolor: '#ddd', borderwidth: 1,
                },
                xaxis: {
                    title: {
                        text: xLabel,
                        font: { family: 'Times New Roman' }, standoff: 12
                    },
                    range: [xMin - xPad, xMax + xPad],
                    showgrid: true, gridcolor: '#cccccc', gridwidth: 0.5,
                    showline: true, linewidth: 1, mirror: true,
                    ticks: 'outside', ticklen: 4,
                    tickfont: { family: 'Times New Roman', size: 12 },
                    minor: { showgrid: true, gridcolor: '#eeeeee', gridwidth: 0.2 },
                },
                yaxis: {
                    title: {
                        text: yLabel,
                        font: { family: 'Times New Roman' }, standoff: 12
                    },
                    range: [yMin - yPad, yMax + yPad],
                    showgrid: true, gridcolor: '#cccccc', gridwidth: 0.5,
                    showline: true, linewidth: 1, mirror: true,
                    ticks: 'outside', ticklen: 4,
                    tickfont: { family: 'Times New Roman', size: 12 },
                    minor: { showgrid: true, gridcolor: '#eeeeee', gridwidth: 0.2 },
                },
                margin: { t: 30, b: 55, l: 70, r: 160 },
                hovermode: 'closest',
                template: 'plotly_white',
                annotations: [
                    {
                        x: xMin - xPad * 0.5,
                        y: yMax + yPad * 0.8,
                        text: 'Juvenile streams',
                        showarrow: false,
                        font: { size: 10, color: '#e67e22' },
                        xanchor: 'left',
                    },
                    {
                        x: xMax + xPad * 0.3,
                        y: yMin - yPad * 0.6,
                        text: 'Near equilibrium',
                        showarrow: false,
                        font: { size: 10, color: '#27ae60' },
                        xanchor: 'right',
                    },
                ],
            };

            Plotly.react('plot-main', traces, layout, { responsive: true });

            var gd = document.getElementById('plot-main');

            // remove any existing click listeners to prevent duplicates
            gd.removeAllListeners('plotly_click');

            // Add click event listener to capture clicked point's FID and send it to Python
            gd.on('plotly_click', function(eventData){
                var point = eventData.points[0];
                var clickedFid = point.customdata; // FID is stored in customdata of the trace

                if (clickedFid !== undefined) {
                    // Send the clicked FID back to Python via the bridge
                    onBridgeReady(function(bridge) {
                        bridge.receive_click_id(clickedFid);
                    });
                }
            });

        }

        // ── Stats bar ─────────────────────────────────────────────────
        function _updateStats(data) {
            var results = data.results || [];
            var n = results.length;
            if (!n) return;

            var maxcs = results.map(function (r) { return Math.abs(r.maxC); });
            var dls = results.map(function (r) { return r.dL; });
            var cons = results.map(function (r) { return r.concavity; });

            var avg = function (arr) {
                return (arr.reduce(function (a, b) { return a + b; }, 0) / arr.length).toFixed(4);
            };

            document.getElementById('stat-n').textContent = n;
            document.getElementById('stat-maxc').textContent = avg(maxcs);
            document.getElementById('stat-dl').textContent = avg(dls);
            document.getElementById('stat-concav').textContent = avg(cons) + ' %';
            document.getElementById('stat-view').textContent =
                data.view_mode === 'profiles' ? 'Profiles' : 'Binary';
        }
    </script>
</body>

</html>
